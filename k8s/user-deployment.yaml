apiVersion: v1
kind: ConfigMap
metadata:
  name: user-config
data:
  DB_HOST: "user-db-service"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: muhammadibrahimrazafa23bcs121/user-service:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: user-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP