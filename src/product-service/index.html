<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopZone - Products</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <nav>
    <div class="logo">ShopZone</div>

    <ul>
      <li><a href="../frontend/index.html">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="../order-service/index.html">Orders</a></li>
      <li><a href="../user-service/index.html">Account</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>All Products</h1>
    <p>Find exactly what you're looking for</p>
  </div>

  <div class="filters">
    <span>Filter:</span>

    <button class="filter-btn active">All</button>
    <button class="filter-btn">Electronics</button>
    <button class="filter-btn">Fashion</button>
    <button class="filter-btn">Home</button>
    <button class="filter-btn">Beauty</button>

    <input class="search-box" type="text" placeholder="🔍 Search products...">
  </div>

  <section class="products-section">
    <h2>Showing 8 Products</h2>

    <div class="product-grid">

      <div class="product-card">
        <div class="product-img-wrap">
          <div class="product-img">📱</div>
          <span class="badge">-38%</span>
        </div>

        <div class="product-info">
          <div class="category">Electronics</div>
          <h4>Wireless Earbuds Pro</h4>
          <div class="stars">★★★★★</div>

          <span class="price">$49.99</span>
          <span class="old-price">$79.99</span>

          <button class="btn-cart">Add to Cart</button>
        </div>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2024 ShopZone. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
